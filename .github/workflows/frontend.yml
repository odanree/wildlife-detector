# Frontend CI gate — runs on any PR/push touching the React app or the
# Dockerfile that bakes it in. Fails fast on lint, typecheck, build, and
# Docker multi-stage build so we catch "works on my machine" drift at
# the trust boundary (PR review) instead of during a prod deploy.
#
# Pattern: fail-fast at the CI trust boundary. Each job is independent so
# a lint failure doesn't hide a typecheck failure — reviewer sees the
# full contract-violation surface in one run.

name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docker/web/Dockerfile"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "docker/web/Dockerfile"
      - ".github/workflows/frontend.yml"

# Prevent redundant runs when someone force-pushes to a PR branch.
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: biome + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Prefer --frozen-lockfile once bun.lock is committed. Falls back to
      # unpinned install for the pre-lockfile transition (first CI run
       # after switching from npm). Follow-up PR pins the lock.
      - run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - name: Biome lint + format check
        run: bun run lint
      - name: TypeScript typecheck
        run: bun run typecheck

  antipattern-lint:
    # Tier-1 counter: runs eslint-plugin-react-you-might-not-need-an-effect
    # against PR head AND base, posts a PR comment when the delta > 0.
    # Failing behavior: the job itself never fails (comments are the
    # signal). If you want CI to block on regressions, flip the last
    # `continue-on-error` to false.
    #
    # Only meaningful on PRs — pushes to main go through the counts
    # workflow (.github/workflows/antipattern-counts.yml) which records
    # the merged count to .audit/counts.jsonl for the time-series.
    name: react anti-pattern delta
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - name: Count anti-patterns on PR head
        id: head_count
        run: |
          count=$(bun run lint:antipatterns:count 2>/dev/null || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "PR head: $count you-might-not-need-an-effect findings"
      - name: Checkout base branch
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          git checkout refs/remotes/origin/${{ github.base_ref }} -- src eslint.config.js package.json 2>/dev/null || true
      - name: Count anti-patterns on base branch
        id: base_count
        run: |
          # If base doesn't have eslint.config.js yet (first PR introducing
          # this workflow), treat base count as 0 so the delta reflects
          # everything the PR is introducing.
          if [ ! -f eslint.config.js ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "Base branch has no eslint.config.js — treating base count as 0"
          else
            count=$(bun run lint:antipatterns:count 2>/dev/null || echo 0)
            echo "count=$count" >> "$GITHUB_OUTPUT"
            echo "Base: $count findings"
          fi
      - name: Comment on delta increase
        if: steps.head_count.outputs.count > steps.base_count.outputs.count
        uses: actions/github-script@v7
        with:
          script: |
            const head = ${{ steps.head_count.outputs.count }};
            const base = ${{ steps.base_count.outputs.count }};
            const delta = head - base;
            const body = [
              '### Anti-pattern regression detected',
              '',
              `This PR adds **${delta}** new \`react-you-might-not-need-an-effect\` finding${delta === 1 ? '' : 's'}.`,
              '',
              `| Ref | Count |`,
              `|---|---|`,
              `| Base (\`${{ github.base_ref }}\`) | ${base} |`,
              `| PR head | ${head} |`,
              `| **Delta** | **+${delta}** |`,
              '',
              'Run \`bun run lint:antipatterns\` locally to see the offending lines and fix shape. See #36 for the pattern class and PR #29 for the canonical fix shape.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  build:
    name: vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Prefer --frozen-lockfile once bun.lock is committed. Falls back to
      # unpinned install for the pre-lockfile transition (first CI run
       # after switching from npm). Follow-up PR pins the lock.
      - run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - name: Build production bundle
        run: bun run build
      - name: Verify dist output exists
        run: |
          test -f dist/index.html
          test -d dist/assets

  docker-web-build:
    name: docker web (multi-stage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build web image (both stages)
        # Verifies the bun→python multi-stage build works end-to-end so
        # "vite build passes locally but Docker build breaks" is caught
        # here rather than during `docker compose build` on the host.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
